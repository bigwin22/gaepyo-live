name: Update NEC results

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-nec-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch and commit NEC results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3 4 5; do
            node scripts/fetch-nec-results.mjs --out data/latest.json
            node scripts/prepare-seo.mjs

            if git diff --quiet -- data/latest.json index.html sitemap.xml; then
              echo "No data or SEO change on cycle ${i}"
            else
              git add data/latest.json index.html sitemap.xml
              git commit -m "개표 데이터 갱신"
              git push
            fi

            if [ "$i" != "5" ]; then
              sleep 60
              git pull --rebase
            fi
          done
